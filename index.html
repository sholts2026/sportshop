<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SPORTKIT — חנות חולצות</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--g:#ff0000;--bg:#0a0a0a;--card:#161616;}
        body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;margin:0;overflow-x:hidden;}
        nav{display:flex;flex-direction:column;align-items:center;padding:1.5rem;background:#000;border-bottom:2px solid var(--g);position:sticky;top:0;z-index:100;gap:10px;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--g);letter-spacing:2px;line-height:1;}
        .subtitle{font-size:0.9rem;color:#888;letter-spacing:1px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:15px;padding:15px;}
        .card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid #222;transition:transform 0.2s;display:flex;flex-direction:column;}
        .card:hover{transform:translateY(-5px);border-color:var(--g);}
        .card img{width:100%;aspect-ratio:1/1.2;object-fit:cover;display:block;background:#111;}
        .inf{padding:12px;text-align:center;flex-grow:1;display:flex;flex-direction:column;justify-content:space-between;}
        .cn{font-size:0.85rem;font-weight:600;height:2.6rem;overflow:hidden;margin-bottom:12px;line-height:1.3;color:#eee;}
        .ab{width:100%;background:var(--g);color:#fff;border:none;padding:10px 0;font-weight:700;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block;transition:0.3s;font-size:0.9rem;}
        .ab:hover{background:#cc0000;box-shadow:0 0 15px rgba(255,0,0,0.3);}
        footer{padding:2rem;text-align:center;color:#444;font-size:0.8rem;border-top:1px solid #111;}
    </style>
</head>
<body>

<nav>
    <div class="logo">SPORTKIT</div>
    <div class="subtitle">PREMIUM JERSEY COLLECTION</div>
</nav>

<div class="grid" id="mainGrid"></div>

<footer>© 2026 SPORTKIT - ALL RIGHTS RESERVED</footer>

    function loadSite() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image_url}" referrerpolicy="no-referrer" loading="lazy">
                <div class="inf">
                    <div class="cn">${p.name}</div>
                    <a class="ab" href="https://wa.me/972501234567?text=${encodeURIComponent('היי, אני רוצה להזמין: ' + p.name + '\nלינק לאלבום: ' + p.album_url)}" target="_blank">הזמן בוואטסאפ</a>

</script>
</body>
</html>
