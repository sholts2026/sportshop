<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SportKit — חנות חולצות</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--g:#ff0000;--bg:#0a0a0a;--card:#161616;}
        body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;margin:0;overflow-x:hidden;}
        nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:#000;border-bottom:1px solid #222;position:sticky;top:0;z-index:100;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--g);cursor:pointer;user-select:none;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;padding:2rem;}
        .card{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid #222;transition:.2s;}
        .card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#111;}
        .inf{padding:12px;}
        .cn{font-size:0.8rem;font-weight:500;height:2.5rem;overflow:hidden;margin-bottom:10px;}
        .ab{width:100%;background:var(--g);color:#fff;border:none;padding:10px;font-weight:700;border-radius:4px;cursor:pointer;}
        
        /* Modal ניהול נסתר */
        #adminPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;padding:20px;justify-content:center;align-items:center;}
        .admin-box{background:#111;padding:25px;border:1px solid #333;border-radius:15px;width:100%;max-width:500px;text-align:center;}
        textarea{width:100%;height:150px;background:#000;color:#0f0;border:1px solid #333;margin-bottom:15px;font-family:monospace;padding:10px;}
    </style>
</head>
<body>

<nav>
    <div class="logo" id="mainLogo" oncontextmenu="openAdmin(event)">SPORT<span>KIT</span></div>
    <div id="status" style="font-size:0.7rem;color:#666;">טוען מלאי...</div>
</nav>

<div class="grid" id="mainGrid"></div>

<div id="adminPanel">
    <div class="admin-box">
        <h3>ניהול מלאי מהיר</h3>
        <textarea id="jsonData" placeholder='הדבק כאן את ה-JSON ששאבת מ-Yupoo...'></textarea>
        <button class="ab" onclick="saveData()" style="background:#25d366">עדכן בסיס נתונים 🚀</button>
        <button class="ab" onclick="closeAdmin()" style="background:none;color:#555;margin-top:10px;">סגור</button>
        <div id="adminStatus" style="margin-top:10px;font-size:0.8rem;"></div>
    </div>
</div>

<script>
    const URL = "https://owwitxrrrnyuebtijnhr.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93d2l0eHJycm55dWVidGlqbmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDAyMTEsImV4cCI6MjA5MTcxNjIxMX0.HW4iJAb6Q5n0asAUFxscRNPsd7V2gRbwnsfSeBUByFA";
    const sb = supabase.createClient(URL, KEY);

    // טעינת מוצרים לאתר
    async function loadSite() {
        const { data, error } = await sb.from('products').select('*').eq('is_visible', true).order('id', {ascending: false});
        if (error) return console.error(error);
        
        document.getElementById('status').textContent = `${data.length} דגמים זמינים`;
        document.getElementById('mainGrid').innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.image_url}" referrerpolicy="no-referrer" loading="lazy">
                <div class="inf">
                    <div class="cn">${p.name}</div>
                    <button class="ab" onclick="window.open('https://wa.me/972501234567?text=אני רוצה להזמין: ${encodeURIComponent(p.name)}')">הזמן בוואטסאפ</button>
                </div>
            </div>
        `).join('');
    }

    // פתיחת ניהול - לחיצה ארוכה (או קליק ימני) על הלוגו
    function openAdmin(e) {
        e.preventDefault();
        const pass = prompt("סיסמת מנהל:");
        if(pass === "admin123") {
            document.getElementById('adminPanel').style.display = 'flex';
        }
    }

    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    // שמירת נתונים חדשים
    async function saveData() {
        const input = document.getElementById('jsonData').value;
        const status = document.getElementById('adminStatus');
        try {
            const items = JSON.parse(input);
            status.textContent = "מעלה...";
            const { error } = await sb.from('products').upsert(items, { onConflict: 'album_url' });
            if (error) throw error;
            status.style.color = "#0f0";
            status.textContent = "הצלחנו! האתר התעדכן.";
            loadSite();
        } catch (e) {
            status.style.color = "red";
            status.textContent = "שגיאה בפורמט הנתונים";
        }
    }

    loadSite();
</script>
</body>
</html>
