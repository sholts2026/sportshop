<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SportKit — חנות חולצות</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--g:#ff0000;--bg:#0a0a0a;--card:#161616;}
        body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;margin:0;}
        nav{display:flex;align-items:center;justify-content:center;padding:1rem;background:#000;border-bottom:1px solid #222;position:sticky;top:0;z-index:100;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--g);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:15px;}
        .card{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid #222;}
        .card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
        .inf{padding:10px;text-align:center;}
        .cn{font-size:0.85rem;height:2.5rem;overflow:hidden;margin-bottom:8px;}
        .ab{width:100%;background:var(--g);color:#fff;border:none;padding:8px;font-weight:700;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block;}
    </style>
</head>
<body>

<nav><div class="logo">SPORTKIT</div></nav>
<div class="grid" id="mainGrid"></div>

<script>
    // --- כאן מדביקים את המוצרים מ-YUPOO ---
    const products = [
        {
            "name": "חולצת דוגמה (זה עובד!)",
            "image_url": "https://images.unsplash.com/photo-1521412644187-c49fa0b4e6a3?w=500",
            "album_url": "https://google.com"
        }
        // פשוט תוסיף כאן עוד מוצרים בהמשך...
    ];

    function loadSite() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image_url}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                <div class="inf">
                    <div class="cn">${p.name}</div>
                    <a class="ab" href="https://wa.me/972501234567?text=${encodeURIComponent('אני רוצה להזמין: ' + p.name)}" target="_blank">הזמן בוואטסאפ</a>
                </div>
            </div>
        `).join('');
    }

    loadSite();
</script>
</body>
</html>
